name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      runner_mode:
        description: "Runner selection"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - self-hosted
          - github
          - skip

jobs:
  determine-runner:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.runner-logic.outputs.should-skip }}
      runner-type: ${{ steps.runner-logic.outputs.runner-type }}
    steps:
      - name: Determine runner
        id: runner-logic
        run: |
          # Check for [skip-ci] in commit message
          if [[ "${{ github.event.head_commit.message }}" == *"[skip-ci]"* ]]; then
            echo "should-skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Manual override
          if [[ "${{ github.event.inputs.runner_mode }}" == "skip" ]]; then
            echo "should-skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "should-skip=false" >> $GITHUB_OUTPUT

          # Check for manual runner selection
          if [[ "${{ github.event.inputs.runner_mode }}" != "" && "${{ github.event.inputs.runner_mode }}" != "auto" ]]; then
            echo "runner-type=${{ github.event.inputs.runner_mode }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check commit message flags
          if [[ "${{ github.event.head_commit.message }}" == *"[self-hosted]"* ]]; then
            echo "runner-type=self-hosted" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "${{ github.event.head_commit.message }}" == *"[github]"* ]]; then
            echo "runner-type=github" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto-select based on day of month
          day=$(date +%d)
          if [ $day -le 25 ]; then
            echo "runner-type=self-hosted" >> $GITHUB_OUTPUT
          else
            echo "runner-type=github" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: determine-runner
    if: needs.determine-runner.outputs.should-skip != 'true'
    runs-on: ${{ needs.determine-runner.outputs.runner-type == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  type-check:
    needs: determine-runner
    if: needs.determine-runner.outputs.should-skip != 'true'
    runs-on: ${{ needs.determine-runner.outputs.runner-type == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run type-check

  test:
    needs: determine-runner
    if: needs.determine-runner.outputs.should-skip != 'true'
    runs-on: ${{ needs.determine-runner.outputs.runner-type == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  build:
    needs: determine-runner
    if: needs.determine-runner.outputs.should-skip != 'true'
    runs-on: ${{ needs.determine-runner.outputs.runner-type == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi
          echo "Build successful: dist/index.js created"
