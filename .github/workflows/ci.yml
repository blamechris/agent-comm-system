name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      runner_mode:
        description: "Runner selection"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - self-hosted
          - github
          - skip

jobs:
  determine-runner:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.runner-logic.outputs.should-skip }}
      runner-type: ${{ steps.runner-logic.outputs.runner-type }}
    steps:
      - name: Determine runner
        id: runner-logic
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Commit message: ${{ github.event.head_commit.message }}"
          echo "PR title: ${{ github.event.pull_request.title }}"

          # Check for [skip-ci] in commit message or PR title
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          if [[ -n "$COMMIT_MSG" && "$COMMIT_MSG" == *"[skip-ci]"* ]]; then
            echo "Skipping CI due to [skip-ci] in commit message"
            echo "should-skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ -n "$PR_TITLE" && "$PR_TITLE" == *"[skip-ci]"* ]]; then
            echo "Skipping CI due to [skip-ci] in PR title"
            echo "should-skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Manual override
          if [[ "${{ github.event.inputs.runner_mode }}" == "skip" ]]; then
            echo "Skipping CI due to manual override"
            echo "should-skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "should-skip=false" >> $GITHUB_OUTPUT

          # Check for manual runner selection
          if [[ "${{ github.event.inputs.runner_mode }}" != "" && "${{ github.event.inputs.runner_mode }}" != "auto" ]]; then
            echo "Using manual runner selection: ${{ github.event.inputs.runner_mode }}"
            echo "runner-type=${{ github.event.inputs.runner_mode }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check commit message flags (for push events)
          if [[ -n "$COMMIT_MSG" && "$COMMIT_MSG" == *"[self-hosted]"* ]]; then
            echo "Using self-hosted runner (from commit message)"
            echo "runner-type=self-hosted" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ -n "$COMMIT_MSG" && "$COMMIT_MSG" == *"[github]"* ]]; then
            echo "Using GitHub runner (from commit message)"
            echo "runner-type=github" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto-select based on day of month
          day=$(date +%d)
          echo "Auto-selecting runner based on day: $day"
          if [ $day -le 25 ]; then
            echo "Using self-hosted runner (day <= 25)"
            echo "runner-type=self-hosted" >> $GITHUB_OUTPUT
          else
            echo "Using GitHub runner (day > 25)"
            echo "runner-type=github" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: determine-runner
    if: needs.determine-runner.outputs.should-skip != 'true'
    runs-on: ${{ needs.determine-runner.outputs.runner-type == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Configure Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Normalize line endings
        run: npm run format

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  type-check:
    needs: determine-runner
    if: needs.determine-runner.outputs.should-skip != 'true'
    runs-on: ${{ needs.determine-runner.outputs.runner-type == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Configure Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Normalize line endings
        run: npm run format

      - name: Run TypeScript type checking
        run: npm run type-check

  test:
    needs: determine-runner
    if: needs.determine-runner.outputs.should-skip != 'true'
    runs-on: ${{ needs.determine-runner.outputs.runner-type == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Configure Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Normalize line endings
        run: npm run format

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  build:
    needs: determine-runner
    if: needs.determine-runner.outputs.should-skip != 'true'
    runs-on: ${{ needs.determine-runner.outputs.runner-type == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Configure Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Normalize line endings
        run: npm run format

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi
          echo "Build successful: dist/index.js created"
